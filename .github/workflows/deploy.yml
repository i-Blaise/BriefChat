name: Deploy BriefChat Server

on:
  push:
    branches:
      - main
    # paths:
    #   - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: root
          key: ${{ secrets.PERSONAL_SERVER_SSH_KEY }}
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            nvm use 22

            cd /var/www/production/BriefChat/server

            git fetch origin
            git reset --hard origin/main
            git clean -fd -e .env

            npm install --production
                    
            pm2 restart briefchat-proxy || pm2 start index.js --name briefchat-proxy
