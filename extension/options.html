<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BriefChat — Settings</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #111113;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 24px 64px;
            font-size: 14px;
        }

        .container {
            width: 100%;
            max-width: 460px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 36px;
        }

        .header img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        .header-text h1 {
            font-size: 20px;
            font-weight: 700;
            color: #f0f0f0;
            letter-spacing: -0.3px;
        }

        .header-text p {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        /* Card */
        .card {
            background: #1a1a1e;
            border: 1px solid #2a2a2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #555;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #ccc;
            margin-bottom: 8px;
        }

        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: #111113;
            border: 1px solid #2e2e34;
            border-radius: 10px;
            font-size: 13.5px;
            font-family: ui-monospace, monospace;
            color: #e8e8e8;
            margin-bottom: 8px;
            transition: border-color 0.15s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #2563eb;
        }

        input[type="password"]::placeholder {
            color: #444;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .provider-detected {
            font-size: 12px;
            color: #4a90e2;
            min-height: 18px;
            margin-bottom: 16px;
        }

        /* Provider badges */
        .providers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .provider-badge {
            background: #111113;
            border: 1px solid #2a2a2e;
            border-radius: 8px;
            padding: 8px 12px;
        }

        .provider-badge .name {
            font-size: 12px;
            font-weight: 500;
            color: #ccc;
            margin-bottom: 2px;
        }

        .provider-badge .prefix {
            font-family: ui-monospace, monospace;
            font-size: 11px;
            color: #555;
        }

        .privacy-note {
            font-size: 11.5px;
            color: #555;
            line-height: 1.6;
            padding-top: 16px;
            border-top: 1px solid #222;
        }

        /* Save button */
        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button {
            padding: 10px 28px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13.5px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        button:hover {
            background: #1d4ed8;
        }

        #status {
            font-size: 12.5px;
            min-height: 18px;
        }

        #status.success { color: #34d399; }
        #status.error   { color: #f87171; }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
        }

        .footer a {
            font-size: 12px;
            color: #444;
            text-decoration: none;
            transition: color 0.15s;
        }

        .footer a:hover {
            color: #888;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <img src="icons/icon128.png" alt="BriefChat logo">
            <div class="header-text">
                <h1>BriefChat</h1>
                <p>Settings</p>
            </div>
        </div>

        <div class="card">
            <p class="card-title">API Key</p>

            <label for="apiKeyInput">Your API Key <span style="font-weight:400;color:#555">(optional)</span></label>

            <div class="providers">
                <div class="provider-badge">
                    <div class="name">OpenAI</div>
                    <div class="prefix">sk-...</div>
                </div>
                <div class="provider-badge">
                    <div class="name">Anthropic Claude</div>
                    <div class="prefix">sk-ant-...</div>
                </div>
                <div class="provider-badge">
                    <div class="name">Google Gemini</div>
                    <div class="prefix">AIza...</div>
                </div>
                <div class="provider-badge">
                    <div class="name">xAI Grok</div>
                    <div class="prefix">xai-...</div>
                </div>
            </div>

            <input type="password" id="apiKeyInput" placeholder="Paste your API key here" autocomplete="off" spellcheck="false">
            <p class="provider-detected" id="providerDetected"></p>

            <div class="actions">
                <button id="saveBtn">Save</button>
                <div id="status"></div>
            </div>

            <p class="privacy-note" style="margin-top:16px;">
                Your key is stored only on your device and sent directly to the provider — never through our servers.
            </p>
        </div>

        <div class="footer">
            <a href="https://briefchat-privacy-policy.artfricastudio.com/" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
        </div>

    </div>

    <script src="options.js"></script>
</body>

</html>
