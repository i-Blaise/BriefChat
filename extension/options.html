<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BriefChat — Settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 480px;
            margin: 48px auto;
            padding: 0 24px 48px;
            color-scheme: light dark;
            font-size: 14px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 13px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .hint {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .hint code {
            font-family: ui-monospace, monospace;
            background: #f3f4f6;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 11px;
        }

        @media (prefers-color-scheme: dark) {
            .hint code {
                background: #374151;
            }
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 6px;
            box-sizing: border-box;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #2563eb;
        }

        .provider-detected {
            font-size: 12px;
            color: #2563eb;
            min-height: 18px;
            margin-bottom: 12px;
        }

        button {
            padding: 10px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        button:hover {
            background: #1d4ed8;
        }

        #status {
            margin-top: 12px;
            font-size: 13px;
            min-height: 20px;
        }

        #status.success {
            color: #16a34a;
        }

        #status.error {
            color: #dc2626;
        }
    </style>
</head>

<body>
    <h1>💬 BriefChat</h1>
    <p class="subtitle">Settings</p>

    <label for="apiKeyInput">Your API Key <span style="font-weight:400;color:#888">(optional)</span></label>
    <p class="hint">
        Add your own key for unlimited chats. Accepted formats:<br>
        OpenAI: <code>sk-...</code> or <code>sk-proj-...</code><br>
        Anthropic Claude: <code>sk-ant-...</code><br>
        Google Gemini: <code>AIza...</code><br>
        xAI Grok: <code>xai-...</code><br><br>
        Your key is stored only on your device and sent directly to the provider — never through our servers.
    </p>
    <input type="password" id="apiKeyInput" placeholder="sk-... or sk-ant-... or AIza... or xai-..." autocomplete="off"
        spellcheck="false">
    <p class="provider-detected" id="providerDetected"></p>

    <button id="saveBtn">Save</button>
    <div id="status"></div>

    <script src="options.js"></script>
</body>

</html>
